name: pkgdown

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown
          needs: website

      - name: Install package for article preflight
        run: R CMD INSTALL --no-multiarch --with-keep.source .

      - name: Build SA practice article preflight
        timeout-minutes: 10
        run: |
          pkgdown::build_article(
            name = "seasight-sa-practice",
            new_process = TRUE,
            lazy = FALSE,
            quiet = FALSE
          )
        shell: Rscript {0}

      - name: Build pkgdown site
        timeout-minutes: 20
        run: |
          pkgdown::build_site_github_pages(
            new_process = TRUE,
            install = TRUE,
            lazy = FALSE,
            quiet = FALSE
          )
        shell: Rscript {0}

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
